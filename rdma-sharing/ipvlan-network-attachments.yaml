apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ipvlan-fabric0
spec:
  config: '{
      "cniVersion": "0.3.1",
      "type": "ipvlan",
      "master": "fabric0",
      "mode": "l2",
      "ipam": {  
        "type": "whereabouts",
        "range": "192.168.100.0/24"
      }
    }'
---

