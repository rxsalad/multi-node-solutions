apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: mpi-multus-b300x8
spec:
  slotsPerWorker: 8
  runPolicy:
    cleanPodPolicy: Running
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          containers:
            - name: mpi-launcher
              image: ghcr.io/coreweave/nccl-tests:13.2.0-devel-ubuntu24.04-nccl2.29.7-1-7112046
              command:
                - mpirun
                - --allow-run-as-root
                - -np
                - "32"
                - -bind-to
                - none
                - -map-by
                - slot
                - -x
                - NCCL_SOCKET_IFNAME=eth0
                - -x
                - NCCL_DEBUG=WARN
                #
                - -x
                - NCCL_CROSS_NIC=0
                - -x
                - NCCL_PXN_DISABLE=0
                - -x
                - NCCL_NET_DISABLE_INTRA=1
                - -x
                - NCCL_IB_TC=104 
                - -x
                - NCCL_IB_FIFO_TC=192
                #
                - -x
                - PATH
                - -mca
                - plm_rsh_args
                - "-p 2222 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
                - -mca
                - btl
                - self,tcp
                # - -mca
                # - pml
                # - ^ucx
                - /opt/nccl-tests/build/all_reduce_perf
                - -b
                - "8"
                - -e
                - 16G
                - -f
                - "2"
                - -g
                - "1"
                - -w
                - "5"
                - --iters
                - "100"
    Worker:
      replicas: 4
      template:
        metadata:
          annotations:
            k8s.v1.cni.cncf.io/networks: >-
              ipvlan-fabric0@net0,
              ipvlan-fabric1@net1,
              ipvlan-fabric2@net2,
              ipvlan-fabric3@net3,
              ipvlan-fabric4@net4,
              ipvlan-fabric5@net5,
              ipvlan-fabric6@net6,
              ipvlan-fabric7@net7,
              ipvlan-fabric8@net8,
              ipvlan-fabric9@net9,
              ipvlan-fabric10@net10,
              ipvlan-fabric11@net11,
              ipvlan-fabric12@net12,
              ipvlan-fabric13@net13,
              ipvlan-fabric14@net14,
              ipvlan-fabric15@net15
        spec:
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"
          initContainers:
            - name: setup-ssh
              image: ghcr.io/coreweave/nccl-tests:13.2.0-devel-ubuntu24.04-nccl2.29.7-1-7112046
              command:
                - /bin/bash
                - -c
                - |
                  set -ex
                  
                  echo "Setting up SSH configuration..."
                  mkdir -p /ssh-setup/sshd
                  
                  echo "Generating SSH host keys..."
                  ssh-keygen -t rsa -f /ssh-setup/sshd/ssh_host_rsa_key -N '' 2>/dev/null
                  ssh-keygen -t ecdsa -f /ssh-setup/sshd/ssh_host_ecdsa_key -N '' 2>/dev/null
                  ssh-keygen -t ed25519 -f /ssh-setup/sshd/ssh_host_ed25519_key -N '' 2>/dev/null
                  
                  cat > /ssh-setup/sshd/sshd_config << 'SSHD_EOF'
                  Port 2222
                  HostKey /etc/ssh-runtime/ssh_host_rsa_key
                  HostKey /etc/ssh-runtime/ssh_host_ecdsa_key
                  HostKey /etc/ssh-runtime/ssh_host_ed25519_key
                  PermitRootLogin yes
                  PubkeyAuthentication yes
                  AuthorizedKeysFile /root/.ssh/authorized_keys /root/.ssh/id_rsa.pub
                  PasswordAuthentication no
                  ChallengeResponseAuthentication no
                  UsePAM no
                  PrintMotd no
                  PidFile /var/run/sshd.pid
                  StrictModes no
                  SSHD_EOF
                  
                  echo "SSH setup complete"
                  echo "Files in /ssh-setup/sshd:"
                  ls -la /ssh-setup/sshd/
              volumeMounts:
                - name: ssh-setup
                  mountPath: /ssh-setup
          containers:
            - name: mpi-worker
              image: ghcr.io/coreweave/nccl-tests:13.2.0-devel-ubuntu24.04-nccl2.29.7-1-7112046
              command:
                - /bin/bash
                - -c
                - |
                  set -ex
                  
                  echo "Starting worker container..."
                  mkdir -p /var/run/sshd /etc/ssh-runtime
                  
                  echo "Copying SSH host keys and config from init container..."
                  cp /ssh-setup/sshd/* /etc/ssh-runtime/
                  
                  echo "SSH runtime files:"
                  ls -la /etc/ssh-runtime/
                  
                  echo "Verifying operator-provided SSH keys at /root/.ssh..."
                  ls -la /root/.ssh/ || echo "Warning: /root/.ssh not found"
                  
                  echo "Starting sshd in foreground..."
                  exec /usr/sbin/sshd -D -e -f /etc/ssh-runtime/sshd_config
              securityContext:
                privileged: true
                capabilities:
                  add:
                    - IPC_LOCK
              volumeMounts:
                - name: ssh-setup
                  mountPath: /ssh-setup
                - name: dshm
                  mountPath: /dev/shm
              resources:
                limits:
                  nvidia.com/gpu: 8
                  rdma/fabric0: 10
                  rdma/fabric1: 10
                  rdma/fabric2: 10
                  rdma/fabric3: 10
                  rdma/fabric4: 10
                  rdma/fabric5: 10
                  rdma/fabric6: 10
                  rdma/fabric7: 10
                  rdma/fabric8: 10
                  rdma/fabric9: 10
                  rdma/fabric10: 10
                  rdma/fabric11: 10
                  rdma/fabric12: 10
                  rdma/fabric13: 10
                  rdma/fabric14: 10
                  rdma/fabric15: 10
                requests:
                  nvidia.com/gpu: 8
                  rdma/fabric0: 10
                  rdma/fabric1: 10
                  rdma/fabric2: 10
                  rdma/fabric3: 10
                  rdma/fabric4: 10
                  rdma/fabric5: 10
                  rdma/fabric6: 10
                  rdma/fabric7: 10
                  rdma/fabric8: 10
                  rdma/fabric9: 10
                  rdma/fabric10: 10
                  rdma/fabric11: 10
                  rdma/fabric12: 10
                  rdma/fabric13: 10
                  rdma/fabric13: 10
                  rdma/fabric14: 10
                  rdma/fabric15: 10
              readinessProbe:
                tcpSocket:
                  port: 2222
                initialDelaySeconds: 5
                periodSeconds: 3
                timeoutSeconds: 2
              livenessProbe:
                tcpSocket:
                  port: 2222
                initialDelaySeconds: 15
                periodSeconds: 10
                timeoutSeconds: 2
          volumes:
            - name: ssh-setup
              emptyDir: {}
            - name: dshm
              emptyDir:
                medium: Memory
                sizeLimit: 16Gi